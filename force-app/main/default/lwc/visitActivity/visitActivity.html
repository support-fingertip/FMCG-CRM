<template>
    <!-- Back Navigation -->
    <div class="va-back-nav">
        <lightning-button
            variant="base"
            label="Back to Visits"
            icon-name="utility:back"
            onclick={handleGoBack}>
        </lightning-button>
    </div>

    <!-- Visit Header Card -->
    <lightning-card>
        <div class="va-header">
            <div class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center slds-wrap">
                <div class="slds-col slds-size_12-of-12 slds-medium-size_7-of-12">
                    <div class="va-outlet-info">
                        <div class="va-sequence">#{visitSequence}</div>
                        <div class="va-outlet-details">
                            <h2 class="va-outlet-name">{outletName}</h2>
                            <div class="va-outlet-meta">
                                <template if:true={beatName}>
                                    <span class="va-beat-badge">{beatName}</span>
                                </template>
                                <template if:true={isAdHoc}>
                                    <span class="va-adhoc-badge">Ad-hoc</span>
                                </template>
                                <span class={statusBadgeClass}>{visitStatus}</span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="slds-col slds-size_12-of-12 slds-medium-size_5-of-12 slds-m-top_small">
                    <div class="va-kpi-row">
                        <div class="va-kpi">
                            <span class="va-kpi-value">{checkInTime}</span>
                            <span class="va-kpi-label">Check-In</span>
                        </div>
                        <div class="va-kpi">
                            <span class="va-kpi-value">{totalOrdersCount}</span>
                            <span class="va-kpi-label">Orders</span>
                        </div>
                        <div class="va-kpi">
                            <span class="va-kpi-value">{orderValue}</span>
                            <span class="va-kpi-label">Value</span>
                        </div>
                        <div class="va-kpi">
                            <span class="va-kpi-value">{collectionAmount}</span>
                            <span class="va-kpi-label">Collected</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <template if:true={isActiveVisit}>
                <div class="va-actions slds-m-top_small">
                    <lightning-button variant="brand" label="New Order" icon-name="utility:cart" onclick={handleNewOrder} class="slds-m-right_x-small"></lightning-button>
                    <lightning-button variant="neutral" label="Collect Payment" icon-name="utility:moneybag" onclick={handleNewCollection} class="slds-m-right_x-small"></lightning-button>
                    <lightning-button variant="neutral" label="Return" icon-name="utility:undo" onclick={handleNewReturn} class="slds-m-right_x-small"></lightning-button>
                    <lightning-button variant="destructive" label="Check Out" icon-name="utility:logout" onclick={handleCheckoutClick}></lightning-button>
                </div>
            </template>
        </div>
    </lightning-card>

    <!-- Activity Tabs -->
    <div class="va-content slds-m-top_small">
        <lightning-card>
            <div class="va-tabs">
                <button class={activitiesTabClass} data-tab="activities" onclick={handleTabClick}>Activities</button>
                <button class={ordersTabClass} data-tab="orders" onclick={handleTabClick}>
                    Orders
                    <template if:true={hasOrders}>
                        <span class="va-tab-count">{orders.length}</span>
                    </template>
                </button>
                <button class={collectionsTabClass} data-tab="collections" onclick={handleTabClick}>
                    Collections
                    <template if:true={hasCollections}>
                        <span class="va-tab-count">{collections.length}</span>
                    </template>
                </button>
                <button class={returnsTabClass} data-tab="returns" onclick={handleTabClick}>Returns</button>
            </div>

            <!-- Activities Tab -->
            <template if:true={isActivitiesTab}>
                <div class="va-tab-content">
                    <div class="va-activity-grid">
                        <template for:each={activities} for:item="act">
                            <div class="va-activity-card" key={act.id} data-id={act.id} onclick={handleActivityClick}>
                                <lightning-icon icon-name={act.icon} size="medium" class="va-act-icon"></lightning-icon>
                                <span class="va-act-label">{act.label}</span>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Orders Tab -->
            <template if:true={isOrdersTab}>
                <div class="va-tab-content">
                    <template if:true={isActiveVisit}>
                        <div class="slds-m-bottom_small">
                            <lightning-button variant="brand" label="New Order" icon-name="utility:add" onclick={handleNewOrder}></lightning-button>
                        </div>
                    </template>
                    <template if:true={hasOrders}>
                        <template for:each={orders} for:item="order">
                            <div class="va-record-row" key={order.Id} data-id={order.Id} data-object="Sales_Order__c" onclick={handleViewRecord}>
                                <div class="va-record-info">
                                    <span class="va-record-name">{order.Name}</span>
                                    <span class="va-record-detail">{order.Status__c}</span>
                                </div>
                                <div class="va-record-amount">{order.amountFormatted}</div>
                                <lightning-icon icon-name="utility:chevronright" size="xx-small" class="va-record-chevron"></lightning-icon>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasOrders}>
                        <div class="va-empty-tab">
                            <lightning-icon icon-name="utility:cart" size="small" class="slds-m-bottom_small"></lightning-icon>
                            <p>No orders placed during this visit</p>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Collections Tab -->
            <template if:true={isCollectionsTab}>
                <div class="va-tab-content">
                    <template if:true={isActiveVisit}>
                        <div class="slds-m-bottom_small">
                            <lightning-button variant="brand" label="Collect Payment" icon-name="utility:add" onclick={handleNewCollection}></lightning-button>
                        </div>
                    </template>
                    <template if:true={hasCollections}>
                        <template for:each={collections} for:item="coll">
                            <div class="va-record-row" key={coll.Id} data-id={coll.Id} data-object="Collection__c" onclick={handleViewRecord}>
                                <div class="va-record-info">
                                    <span class="va-record-name">{coll.Name}</span>
                                    <span class="va-record-detail">{coll.Payment_Mode__c} - {coll.Status__c}</span>
                                </div>
                                <div class="va-record-amount">{coll.amountFormatted}</div>
                                <lightning-icon icon-name="utility:chevronright" size="xx-small" class="va-record-chevron"></lightning-icon>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasCollections}>
                        <div class="va-empty-tab">
                            <lightning-icon icon-name="utility:moneybag" size="small" class="slds-m-bottom_small"></lightning-icon>
                            <p>No collections recorded during this visit</p>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Returns Tab -->
            <template if:true={isReturnsTab}>
                <div class="va-tab-content">
                    <template if:true={isActiveVisit}>
                        <div class="slds-m-bottom_small">
                            <lightning-button variant="brand" label="Create Return" icon-name="utility:add" onclick={handleNewReturn}></lightning-button>
                        </div>
                    </template>
                    <div class="va-empty-tab">
                        <lightning-icon icon-name="utility:undo" size="small" class="slds-m-bottom_small"></lightning-icon>
                        <p>Returns can be created from the button above</p>
                    </div>
                </div>
            </template>
        </lightning-card>
    </div>

    <!-- Checkout Modal -->
    <template if:true={isCheckoutModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="checkout-heading" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon icon-name="utility:close" alternative-text="Close" variant="bare-inverse" class="slds-modal__close" onclick={handleCheckoutClose}></lightning-button-icon>
                    <h2 id="checkout-heading" class="slds-text-heading_medium">Complete Visit</h2>
                    <p class="slds-m-top_x-small slds-text-body_small slds-text-color_inverse-weak">
                        Check out from {outletName}
                    </p>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <!-- Visit Summary -->
                    <div class="checkout-summary slds-m-bottom_medium">
                        <div class="checkout-stat">
                            <span class="checkout-stat-label">Orders</span>
                            <span class="checkout-stat-value">{totalOrdersCount}</span>
                        </div>
                        <div class="checkout-stat">
                            <span class="checkout-stat-label">Order Value</span>
                            <span class="checkout-stat-value">{orderValue}</span>
                        </div>
                        <div class="checkout-stat">
                            <span class="checkout-stat-label">Collections</span>
                            <span class="checkout-stat-value">{collectionAmount}</span>
                        </div>
                    </div>

                    <!-- Productive Toggle -->
                    <lightning-input
                        type="toggle"
                        label="Was this a productive visit?"
                        checked={isProductive}
                        onchange={handleProductiveChange}
                        message-toggle-active="Yes"
                        message-toggle-inactive="No"
                        class="slds-m-bottom_small">
                    </lightning-input>

                    <!-- Non-Productive Reason -->
                    <template if:false={isProductive}>
                        <lightning-combobox
                            name="nonProductiveReason"
                            label="Reason"
                            value={nonProductiveReason}
                            placeholder="Select reason..."
                            options={nonProductiveReasonOptions}
                            onchange={handleNonProductiveReasonChange}
                            required
                            class="slds-m-bottom_small">
                        </lightning-combobox>
                    </template>

                    <!-- Notes -->
                    <lightning-textarea
                        label="Visit Notes"
                        value={checkoutNotes}
                        onchange={handleCheckoutNotesChange}
                        placeholder="Any observations or notes..."
                        max-length="1000">
                    </lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button variant="neutral" label="Cancel" onclick={handleCheckoutClose} class="slds-m-right_x-small"></lightning-button>
                    <lightning-button variant="brand" label="Complete Visit" icon-name="utility:check" onclick={handleCheckoutConfirm} disabled={isCheckoutDisabled}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- Loading -->
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading..." size="medium"></lightning-spinner>
    </template>
</template>
