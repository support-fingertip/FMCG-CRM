<template>
    <!-- Loading Spinner -->
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading" size="medium" class="spinner-overlay"></lightning-spinner>
    </template>

    <!-- Messages -->
    <template if:true={errorMessage}>
        <div class="msg msg-error">
            <lightning-icon icon-name="utility:error" size="x-small" variant="inverse"></lightning-icon>
            <span>{errorMessage}</span>
        </div>
    </template>
    <template if:true={successMessage}>
        <div class="msg msg-success">
            <lightning-icon icon-name="utility:success" size="x-small" variant="inverse"></lightning-icon>
            <span>{successMessage}</span>
        </div>
    </template>

    <div class="exp-container">
        <!-- Header Bar -->
        <div class="exp-header">
            <div class="header-left">
                <lightning-icon icon-name="standard:expense_report" size="small"></lightning-icon>
                <span class="header-title">Expense Manager</span>
            </div>
            <div class="header-right">
                <template if:true={expense.Name}>
                    <span class="header-ref">{expense.Name}</span>
                </template>
            </div>
        </div>

        <!-- Info Bar: Date Range, Executive, Band, Status -->
        <div class="info-bar">
            <div class="info-bar-fields">
                <div class="info-field">
                    <label class="info-label">Month</label>
                    <lightning-combobox
                        value={selectedMonth}
                        options={monthOptions}
                        onchange={handleMonthChange}
                        variant="label-hidden"
                        class="month-select">
                    </lightning-combobox>
                </div>
                <div class="info-field">
                    <label class="info-label">Year</label>
                    <lightning-combobox
                        value={selectedYear}
                        options={yearOptions}
                        onchange={handleYearChange}
                        variant="label-hidden"
                        class="year-select">
                    </lightning-combobox>
                </div>
                <div class="info-field">
                    <label class="info-label">Executive Name</label>
                    <span class="info-value">{employeeName}</span>
                </div>
                <div class="info-field info-field-sm">
                    <label class="info-label">Band</label>
                    <span class="info-value">{employeeBand}</span>
                </div>
                <template if:true={expense.Status__c}>
                    <div class="info-field info-field-sm">
                        <label class="info-label">Status</label>
                        <span class={statusBadgeClass}>{expense.Status__c}</span>
                    </div>
                </template>
                <template if:true={hasComments}>
                    <div class="info-field info-field-sm">
                        <lightning-button
                            label="History"
                            icon-name="utility:comments"
                            variant="base"
                            onclick={handleShowComments}
                            class="comments-btn">
                        </lightning-button>
                    </div>
                </template>
            </div>
        </div>

        <!-- Rejection reason -->
        <template if:true={isRejected}>
            <div class="rejection-banner">
                <lightning-icon icon-name="utility:warning" size="x-small" variant="warning"></lightning-icon>
                <span>Rejected: {expense.Rejection_Reason__c}</span>
            </div>
        </template>

        <!-- Stats Row -->
        <div class="stats-grid">
            <div class="stat-card stat-eligible">
                <span class="stat-label">Eligible</span>
                <span class="stat-value">{totalEligible}</span>
            </div>
            <div class="stat-card stat-claimed">
                <span class="stat-label">Claimed</span>
                <span class="stat-value">{totalClaimed}</span>
            </div>
            <div class="stat-card stat-approved">
                <span class="stat-label">Approved</span>
                <span class="stat-value">{totalApproved}</span>
            </div>
            <div class="stat-card stat-days">
                <span class="stat-label">Days</span>
                <span class="stat-value">{workingDays}</span>
            </div>
            <div class="stat-card stat-distance">
                <span class="stat-label">Distance</span>
                <span class="stat-value">{totalDistance} km</span>
            </div>
        </div>

        <!-- Tab Bar -->
        <div class="tab-bar">
            <button class={expenseTabClass} data-tab="expense" onclick={handleTabClick}>
                <lightning-icon icon-name="utility:money" size="xx-small"></lightning-icon>
                <span>Expenses</span>
            </button>
            <button class={summaryTabClass} data-tab="summary" onclick={handleTabClick}>
                <lightning-icon icon-name="utility:summary" size="xx-small"></lightning-icon>
                <span>Summary</span>
            </button>
            <button class={overviewTabClass} data-tab="overview" onclick={handleTabClick}>
                <lightning-icon icon-name="utility:date_input" size="xx-small"></lightning-icon>
                <span>Overview</span>
            </button>
            <button class={teamTabClass} data-tab="team" onclick={handleTabClick}>
                <lightning-icon icon-name="utility:groups" size="xx-small"></lightning-icon>
                <span>Team</span>
            </button>
        </div>

        <!-- ═══ Expense Tab: Accordion Day View ═══ -->
        <template if:true={isExpenseTab}>

            <!-- Date Range Info -->
            <div class="date-range-info">
                <span>Period: {expenseStartDate} to {expenseEndDate}</span>
                <span class="date-range-separator">|</span>
                <span>{eligibleDates.length} eligible day(s)</span>
            </div>

            <!-- No Attendance Warning -->
            <template if:false={hasEligibleDates}>
                <div class="no-attendance-banner">
                    <lightning-icon icon-name="utility:people" size="small"></lightning-icon>
                    <div class="no-att-text">
                        <strong>No Attendance Records Found</strong>
                        <span>{noAttendanceMessage}</span>
                    </div>
                </div>
            </template>

            <!-- Day Expenses Accordion -->
            <template if:true={showDayExpenses}>

                <!-- Select All Days -->
                <div class="select-all-bar">
                    <label class="select-all-label">
                        <input type="checkbox" checked={selectAllDays} onchange={handleSelectAllDays} />
                        <span>Select All Days ({eligibleDates.length})</span>
                    </label>
                    <template if:true={hasSelectedDays}>
                        <span class="selected-count">{selectedDaysCount} selected</span>
                    </template>
                </div>

                <!-- Day Rows -->
                <template for:each={dayRows} for:item="day">
                    <div key={day.key} class="day-accordion">
                        <!-- Day Header -->
                        <div class="day-accordion-header" data-date={day.dateStr}>
                            <button class="day-toggle-btn" data-date={day.dateStr} onclick={handleToggleDay}>
                                <template if:true={day.expanded}>
                                    <lightning-icon icon-name="utility:chevrondown" size="xx-small"></lightning-icon>
                                </template>
                                <template if:false={day.expanded}>
                                    <lightning-icon icon-name="utility:chevronright" size="xx-small"></lightning-icon>
                                </template>
                            </button>
                            <label class="day-checkbox">
                                <input type="checkbox" checked={day.selected} data-date={day.dateStr} onchange={handleSelectDay} />
                            </label>
                            <span class="day-date-label">
                                {day.formattedDate}
                                <template if:true={day.dutyType}>
                                    <span class={day.dutyTypeClass}>{day.dutyType}</span>
                                </template>
                                <template if:true={day.beatName}>
                                    <span class="beat-name">({day.beatName})</span>
                                </template>
                            </span>
                            <template if:true={day.hoursWorked}>
                                <span class="day-hours-badge">{day.hoursWorked}h</span>
                            </template>
                            <span class="day-total-right">
                                Total: <span class={day.dayTotalClass}>{day.dayTotal}</span>
                            </span>
                        </div>

                        <!-- Day Body (Expanded) -->
                        <template if:true={day.expanded}>
                            <div class="day-accordion-body">
                                <!-- Missing Check-Out Warning -->
                                <template if:true={day.missingCheckOut}>
                                    <div class="missing-checkout-banner">
                                        <lightning-icon icon-name="utility:warning" size="x-small" variant="warning"></lightning-icon>
                                        <span>Check-out time not recorded. DA hours must be entered manually.</span>
                                    </div>
                                </template>
                                <template for:each={day.items} for:item="item">
                                    <div key={item.key} class="expense-item-row">
                                        <!-- Item Header -->
                                        <div class="item-row-header">
                                            <span class={item.statusClass}>{item.statusLabel}</span>
                                            <span class="item-type-label">{item.expenseType}</span>
                                            <template if:true={item.receiptRequired}>
                                                <span class="receipt-required-badge">Receipt Required</span>
                                            </template>
                                            <template if:true={item.mandatoryRemarks}>
                                                <span class="remarks-required-badge">Remarks Required</span>
                                            </template>
                                            <span class="item-eligible-badge">
                                                Eligible: {item.eligibleAmount}
                                            </span>
                                            <div class="item-actions-right">
                                                <template if:true={canEdit}>
                                                    <lightning-button-icon
                                                        icon-name="utility:delete"
                                                        alternative-text="Delete"
                                                        variant="bare-destructive"
                                                        size="small"
                                                        data-key={item.key}
                                                        onclick={handleDeleteItem}>
                                                    </lightning-button-icon>
                                                </template>
                                            </div>
                                        </div>

                                        <!-- Item Fields -->
                                        <div class="item-fields-row">
                                            <!-- From/To for travel types -->
                                            <template if:true={item.showFromTo}>
                                                <div class="item-field">
                                                    <lightning-input
                                                        label="From"
                                                        type="text"
                                                        value={item.fromLocation}
                                                        data-field="fromLocation"
                                                        data-key={item.key}
                                                        onchange={handleItemFieldChange}
                                                        disabled={cannotEdit}
                                                        variant="label-stacked"
                                                        required>
                                                    </lightning-input>
                                                </div>
                                                <div class="item-field">
                                                    <lightning-input
                                                        label="To"
                                                        type="text"
                                                        value={item.toLocation}
                                                        data-field="toLocation"
                                                        data-key={item.key}
                                                        onchange={handleItemFieldChange}
                                                        disabled={cannotEdit}
                                                        variant="label-stacked"
                                                        required>
                                                    </lightning-input>
                                                </div>
                                            </template>

                                            <!-- Travel Mode (for travel types) -->
                                            <template if:true={item.showTravelMode}>
                                                <div class="item-field item-field-sm">
                                                    <lightning-combobox
                                                        label="Travel Mode"
                                                        value={item.travelMode}
                                                        options={item.allowedTravelModes}
                                                        data-field="travelMode"
                                                        data-key={item.key}
                                                        onchange={handleItemFieldChange}
                                                        disabled={cannotEdit}
                                                        variant="label-stacked"
                                                        placeholder="Select...">
                                                    </lightning-combobox>
                                                </div>
                                            </template>

                                            <!-- Daily KM (for travel) -->
                                            <template if:true={item.showFromTo}>
                                                <div class="item-field item-field-sm">
                                                    <lightning-input
                                                        label="Daily KM"
                                                        type="number"
                                                        step="0.01"
                                                        value={item.manualDistance}
                                                        data-field="manualDistance"
                                                        data-key={item.key}
                                                        onchange={handleItemFieldChange}
                                                        disabled={cannotEdit}
                                                        variant="label-stacked"
                                                        required>
                                                    </lightning-input>
                                                </div>
                                            </template>

                                            <!-- Working Hours (for DA) -->
                                            <template if:true={item.isDA}>
                                                <div class="item-field item-field-sm">
                                                    <lightning-input
                                                        label="Hours"
                                                        type="number"
                                                        step="0.5"
                                                        value={item.workingHours}
                                                        data-field="workingHours"
                                                        data-key={item.key}
                                                        onchange={handleItemFieldChange}
                                                        disabled={cannotEdit}
                                                        variant="label-stacked">
                                                    </lightning-input>
                                                </div>
                                            </template>

                                            <!-- City (from City Tier master) + Auto-resolved Tier -->
                                            <template if:true={item.showCity}>
                                                <div class="item-field">
                                                    <lightning-combobox
                                                        label="City"
                                                        value={item.city}
                                                        options={cityOptions}
                                                        data-field="city"
                                                        data-key={item.key}
                                                        onchange={handleItemFieldChange}
                                                        disabled={cannotEdit}
                                                        variant="label-stacked"
                                                        placeholder="Search city..."
                                                        required>
                                                    </lightning-combobox>
                                                </div>
                                                <template if:true={item.showCityTier}>
                                                    <div class="item-field item-field-sm">
                                                        <lightning-input
                                                            label="City Tier"
                                                            value={item.cityTier}
                                                            data-field="cityTier"
                                                            data-key={item.key}
                                                            variant="label-stacked"
                                                            read-only>
                                                        </lightning-input>
                                                    </div>
                                                </template>
                                            </template>

                                            <!-- Amount -->
                                            <div class="item-field item-field-sm">
                                                <lightning-input
                                                    label="Amount"
                                                    type="number"
                                                    step="0.01"
                                                    value={item.claimedAmount}
                                                    data-field="claimedAmount"
                                                    data-key={item.key}
                                                    onchange={handleItemFieldChange}
                                                    disabled={cannotEdit}
                                                    variant="label-stacked"
                                                    required>
                                                </lightning-input>
                                                <template if:true={item.exceedsEligible}>
                                                    <span class="field-warning-text">Exceeds eligible ({item.eligibleAmount})</span>
                                                </template>
                                            </div>

                                            <!-- System Calculated Amount (readonly) -->
                                            <template if:true={item.systemCalcAmount}>
                                                <div class="item-field item-field-sm">
                                                    <label class="field-label">System Calc.</label>
                                                    <span class="field-value-readonly field-system-calc">{item.systemCalcAmount}</span>
                                                </div>
                                            </template>

                                            <!-- Daily Limit (readonly, for food types) -->
                                            <template if:true={item.isFood}>
                                                <div class="item-field item-field-sm">
                                                    <label class="field-label">Daily Limit</label>
                                                    <span class="field-value-readonly">{item.maxPerDay}</span>
                                                </div>
                                            </template>

                                            <!-- GPS Distance (readonly, for travel) -->
                                            <template if:true={item.isTravel}>
                                                <div class="item-field item-field-sm">
                                                    <label class="field-label">System KM</label>
                                                    <span class="field-value-readonly">{item.gpsDistance}</span>
                                                </div>
                                            </template>

                                            <!-- Remarks / Notes -->
                                            <template if:true={item.showRemarks}>
                                                <div class="item-field item-field-notes">
                                                    <lightning-input
                                                        label="Remarks"
                                                        type="text"
                                                        value={item.notes}
                                                        data-field="notes"
                                                        data-key={item.key}
                                                        onchange={handleItemFieldChange}
                                                        disabled={cannotEdit}
                                                        variant="label-stacked"
                                                        required={item.mandatoryRemarks}>
                                                    </lightning-input>
                                                </div>
                                            </template>
                                        </div>

                                        <!-- Receipt Upload Section -->
                                        <template if:true={item.receiptRequired}>
                                            <div class="item-receipt-section">
                                                <!-- Receipt Status Indicator -->
                                                <div class="receipt-status-row">
                                                    <template if:true={item.hasAnyFiles}>
                                                        <span class="receipt-status receipt-uploaded">
                                                            <lightning-icon icon-name="utility:success" size="xx-small" variant="inverse"></lightning-icon>
                                                            Receipt Attached
                                                        </span>
                                                    </template>
                                                    <template if:false={item.hasAnyFiles}>
                                                        <span class="receipt-status receipt-missing">
                                                            <lightning-icon icon-name="utility:warning" size="xx-small"></lightning-icon>
                                                            Receipt Missing
                                                        </span>
                                                    </template>
                                                </div>
                                                <!-- File upload -->
                                                <template if:true={canEdit}>
                                                    <template if:true={item.id}>
                                                        <!-- Saved item: use native lightning-file-upload -->
                                                        <lightning-file-upload
                                                            label=""
                                                            name="receiptUpload"
                                                            accept={acceptedFileFormats}
                                                            record-id={item.id}
                                                            multiple
                                                            data-key={item.key}
                                                            onuploadfinished={handleUploadFinished}>
                                                        </lightning-file-upload>
                                                    </template>
                                                    <template if:false={item.id}>
                                                        <!-- Unsaved item: stage files locally, upload after save -->
                                                        <div class="pending-upload-row">
                                                            <input type="file"
                                                                accept=".pdf,.png,.jpg,.jpeg,.gif,.bmp,.webp"
                                                                multiple
                                                                data-key={item.key}
                                                                onchange={handlePendingFileChange}
                                                                class="slds-file-selector__input" />
                                                            <p class="slds-text-body_small slds-text-color_weak">Receipts will be uploaded when you save.</p>
                                                        </div>
                                                    </template>
                                                </template>
                                                <!-- Pending (staged) files for unsaved items -->
                                                <template if:true={item.hasPendingFiles}>
                                                    <div class="file-list">
                                                        <template for:each={item.pendingFiles} for:item="pf">
                                                            <div key={pf.key} class="file-item">
                                                                <lightning-icon icon-name="doctype:attachment" size="xx-small"></lightning-icon>
                                                                <span class="file-name" title={pf.fileName}>{pf.fileName}</span>
                                                                <span class="pending-badge">Pending</span>
                                                                <lightning-button-icon
                                                                    icon-name="utility:delete"
                                                                    alternative-text="Remove file"
                                                                    size="small"
                                                                    variant="bare-destructive"
                                                                    data-key={item.key}
                                                                    data-filekey={pf.key}
                                                                    onclick={handleRemovePendingFile}>
                                                                </lightning-button-icon>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                                <!-- Uploaded files list -->
                                                <template if:true={item.hasFiles}>
                                                    <div class="file-list">
                                                        <template for:each={item.files} for:item="file">
                                                            <div key={file.contentDocumentId} class="file-item">
                                                                <lightning-icon icon-name="doctype:attachment" size="xx-small"></lightning-icon>
                                                                <span class="file-name" title={file.title}>{file.title}.{file.fileExtension}</span>
                                                                <template if:true={canEdit}>
                                                                    <lightning-button-icon
                                                                        icon-name="utility:delete"
                                                                        alternative-text="Delete file"
                                                                        size="small"
                                                                        variant="bare-destructive"
                                                                        data-docid={file.contentDocumentId}
                                                                        onclick={handleDeleteFile}>
                                                                    </lightning-button-icon>
                                                                </template>
                                                            </div>
                                                        </template>
                                                    </div>
                                                </template>
                                            </div>
                                        </template>
                                    </div>
                                </template>

                                <!-- Add Expense Type Button -->
                                <template if:true={canEdit}>
                                    <div class="add-line-item-row">
                                        <div class="add-type-wrapper">
                                            <lightning-icon icon-name="utility:add" size="xx-small" class="add-type-icon"></lightning-icon>
                                            <lightning-combobox
                                                label="Expense Type"
                                                placeholder="Select expense type to add..."
                                                options={availableExpenseTypes}
                                                data-date={day.dateStr}
                                                onchange={handleAddTypeChange}
                                                class="add-type-combo">
                                            </lightning-combobox>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </template>

                <!-- Save Error -->
                <template if:true={saveError}>
                    <div class="save-error-msg">
                        <lightning-icon icon-name="utility:error" size="x-small" variant="error"></lightning-icon>
                        <span>{saveError}</span>
                    </div>
                </template>

                <!-- Footer: Grand Total + Actions -->
                <div class="expense-footer">
                    <div class="grand-total">
                        Grand Total: <strong>{grandTotal}</strong>
                    </div>
                    <div class="footer-actions">
                        <lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
                        <template if:true={canEdit}>
                            <lightning-button
                                label="Save"
                                variant="brand"
                                onclick={handleSaveAll}
                                icon-name="utility:save">
                            </lightning-button>
                            <lightning-button
                                label="Save &amp; Submit"
                                variant="success"
                                onclick={handleSaveAndSubmit}
                                icon-name="utility:forward">
                            </lightning-button>
                        </template>
                    </div>
                </div>
            </template>

        </template>

        <!-- ═══ Summary Tab ═══ -->
        <template if:true={isSummaryTab}>
            <div class="summary-section">
                <h3 class="section-title">Type-wise Breakdown</h3>
                <div class="table-wrap">
                    <table class="exp-table">
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th class="num-col">Items</th>
                                <th class="num-col">Eligible</th>
                                <th class="num-col">Claimed</th>
                                <th class="num-col">Approved</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={summaryTypeBreakdown} for:item="row">
                                <tr key={row.type}>
                                    <td>{row.type}</td>
                                    <td class="num-col">{row.count}</td>
                                    <td class="num-col">{row.eligible}</td>
                                    <td class="num-col">{row.claimed}</td>
                                    <td class="num-col">{row.approved}</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>

                <h3 class="section-title">Day-wise Breakdown</h3>
                <div class="table-wrap">
                    <table class="exp-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th class="num-col">Items</th>
                                <th class="num-col">Eligible</th>
                                <th class="num-col">Claimed</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={summaryDayBreakdown} for:item="row">
                                <tr key={row.date}>
                                    <td>{row.date}</td>
                                    <td class="num-col">{row.count}</td>
                                    <td class="num-col">{row.eligible}</td>
                                    <td class="num-col">{row.claimed}</td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </div>
        </template>

        <!-- ═══ Overview Tab ═══ -->
        <template if:true={isOverviewTab}>
            <div class="overview-section">
                <h3 class="section-title">{selectedYear} - Monthly Overview</h3>
                <div class="overview-grid">
                    <template for:each={monthlyOverview} for:item="mo">
                        <div key={mo.month} class="overview-card">
                            <div class="ov-month">{mo.month}</div>
                            <template if:true={mo.hasReport}>
                                <span class="ov-status">{mo.status}</span>
                                <div class="ov-amounts">
                                    <span>Claimed: {mo.totalClaimed}</span>
                                    <span>Approved: {mo.totalApproved}</span>
                                </div>
                            </template>
                            <template if:false={mo.hasReport}>
                                <span class="ov-no-report">No expense</span>
                            </template>
                        </div>
                    </template>
                </div>
            </div>
        </template>

        <!-- ═══ Team Tab ═══ -->
        <template if:true={isTeamTab}>
            <div class="team-section">
                <h3 class="section-title">Team Expenses - {selectedMonth} {selectedYear}</h3>
                <template if:true={hasTeamReports}>
                    <div class="table-wrap">
                        <table class="exp-table">
                            <thead>
                                <tr>
                                    <th>Employee</th>
                                    <th>Band</th>
                                    <th>Status</th>
                                    <th class="num-col">Claimed</th>
                                    <th class="num-col">Approved</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={teamReports} for:item="tr">
                                    <tr key={tr.Id}>
                                        <td>{tr.Employee__r.First_Name__c} {tr.Employee__r.Last_Name__c}</td>
                                        <td>{tr.Employee__r.Band__c}</td>
                                        <td><span class="status-badge-sm">{tr.Status__c}</span></td>
                                        <td class="num-col">{tr.Total_Claimed__c}</td>
                                        <td class="num-col">{tr.Total_Approved__c}</td>
                                        <td class="action-col">
                                            <template if:true={tr.Status__c}>
                                                <lightning-button-group>
                                                    <lightning-button
                                                        label="Approve"
                                                        variant="success"
                                                        data-action="approve"
                                                        data-level="manager"
                                                        data-id={tr.Id}
                                                        onclick={handleOpenApproval}
                                                        class="btn-sm">
                                                    </lightning-button>
                                                    <lightning-button
                                                        label="Reject"
                                                        variant="destructive"
                                                        data-action="reject"
                                                        data-level="manager"
                                                        data-id={tr.Id}
                                                        onclick={handleOpenApproval}
                                                        class="btn-sm">
                                                    </lightning-button>
                                                </lightning-button-group>
                                            </template>
                                        </td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
                <template if:false={hasTeamReports}>
                    <div class="empty-state">
                        <lightning-icon icon-name="utility:sentiment_neutral" size="large"></lightning-icon>
                        <p>No team expense reports found for this period.</p>
                    </div>
                </template>
            </div>
        </template>
    </div>

    <!-- ═══ APPROVAL MODAL ═══ -->
    <template if:true={showApprovalModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        onclick={closeApprovalModal}
                        class="slds-modal__close">
                    </lightning-button-icon>
                    <h2 class="slds-text-heading_medium">{approvalModalTitle}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template if:true={showRemarksField}>
                        <lightning-textarea
                            label="Remarks"
                            value={approvalRemarks}
                            onchange={handleRemarksChange}
                            placeholder="Enter remarks or reason..."
                            max-length="32000">
                        </lightning-textarea>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeApprovalModal}></lightning-button>
                    <lightning-button
                        label={approvalActionLabel}
                        variant={approvalActionVariant}
                        onclick={handleApprovalConfirm}>
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- ═══ SUBMIT CONFIRMATION MODAL ═══ -->
    <template if:true={showSubmitConfirmModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header submit-confirm-header">
                    <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        onclick={closeSubmitConfirmModal}
                        class="slds-modal__close">
                    </lightning-button-icon>
                    <h2 class="slds-text-heading_medium">Confirm Submission</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <!-- Summary Stats -->
                    <div class="submit-summary-grid">
                        <div class="submit-stat">
                            <span class="submit-stat-label">Total Items</span>
                            <span class="submit-stat-value">{submitSummary.totalItems}</span>
                        </div>
                        <div class="submit-stat">
                            <span class="submit-stat-label">Days</span>
                            <span class="submit-stat-value">{submitSummary.dayCount}</span>
                        </div>
                        <div class="submit-stat">
                            <span class="submit-stat-label">Total Claimed</span>
                            <span class="submit-stat-value submit-stat-amount">{submitSummary.totalClaimed}</span>
                        </div>
                        <div class="submit-stat">
                            <span class="submit-stat-label">Total Eligible</span>
                            <span class="submit-stat-value submit-stat-amount">{submitSummary.totalEligible}</span>
                        </div>
                    </div>

                    <!-- Missing Receipts Warning -->
                    <template if:true={submitHasMissingReceipts}>
                        <div class="submit-warning">
                            <lightning-icon icon-name="utility:warning" size="x-small" variant="warning"></lightning-icon>
                            <span>{submitMissingReceipts} item(s) missing required receipts. Please upload before submitting.</span>
                        </div>
                    </template>

                    <!-- Type Breakdown -->
                    <template if:true={submitSummaryItems.length}>
                        <h3 class="submit-section-title">Expense Breakdown</h3>
                        <div class="table-wrap">
                            <table class="exp-table">
                                <thead>
                                    <tr>
                                        <th>Type</th>
                                        <th class="num-col">Items</th>
                                        <th class="num-col">Eligible</th>
                                        <th class="num-col">Claimed</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <template for:each={submitSummaryItems} for:item="row">
                                        <tr key={row.type}>
                                            <td>{row.type}</td>
                                            <td class="num-col">{row.count}</td>
                                            <td class="num-col">{row.eligible}</td>
                                            <td class="num-col">{row.claimed}</td>
                                        </tr>
                                    </template>
                                </tbody>
                            </table>
                        </div>
                    </template>

                    <!-- Remarks -->
                    <div class="submit-remarks">
                        <lightning-textarea
                            label="Submission Remarks (Optional)"
                            value={submitRemarks}
                            onchange={handleSubmitRemarksChange}
                            placeholder="Add any remarks for the approver..."
                            max-length="32000">
                        </lightning-textarea>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeSubmitConfirmModal}></lightning-button>
                    <lightning-button
                        label="Confirm & Submit"
                        variant="success"
                        onclick={handleConfirmSubmit}
                        disabled={submitHasMissingReceipts}
                        icon-name="utility:forward">
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- ═══ COMMENTS HISTORY MODAL ═══ -->
    <template if:true={showCommentsModal}>
        <section role="dialog" tabindex="-1" aria-modal="true" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        onclick={closeCommentsModal}
                        class="slds-modal__close">
                    </lightning-button-icon>
                    <h2 class="slds-text-heading_medium">Comments History</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template if:true={hasCommentsEntries}>
                        <div class="comments-list">
                            <template for:each={commentsHistory} for:item="comment">
                                <div key={comment.key} class="comment-entry">
                                    <lightning-icon icon-name="utility:chat" size="xx-small"></lightning-icon>
                                    <span class="comment-text">{comment.text}</span>
                                </div>
                            </template>
                        </div>
                    </template>
                    <template if:false={hasCommentsEntries}>
                        <p class="no-comments">No comments yet.</p>
                    </template>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={closeCommentsModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
