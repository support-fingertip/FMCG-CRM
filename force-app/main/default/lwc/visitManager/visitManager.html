<template>
    <!-- ══════════════════════════════════════════════════ -->
    <!-- LOADING                                           -->
    <!-- ══════════════════════════════════════════════════ -->
    <template if:true={isLoadingScreen}>
        <div class="vm-loading">
            <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            <p class="vm-loading-text">Loading Visit Manager...</p>
        </div>
    </template>

    <!-- ══════════════════════════════════════════════════ -->
    <!-- SCREEN 1: DAY START                               -->
    <!-- ══════════════════════════════════════════════════ -->
    <template if:true={isDayStartScreen}>
        <div class="vm-container">
            <!-- Header -->
            <div class="vm-header-bar">
                <div class="vm-header-left">
                    <lightning-icon icon-name="standard:visit" size="small" class="vm-header-icon"></lightning-icon>
                    <span class="vm-header-title">Visit Manager</span>
                </div>
                <div class="vm-header-right">
                    <span class="vm-clock">{currentTime}</span>
                </div>
            </div>

            <!-- Greeting -->
            <div class="vm-card">
                <div class="vm-daystart-hero">
                    <p class="vm-greeting">{greetingMessage}!</p>
                    <p class="vm-date">{todayDateDisplay}</p>
                    <div class="vm-status-row">
                        <div class="vm-status-item">
                            <lightning-icon icon-name="utility:location" size="xx-small"></lightning-icon>
                            <span>{locationStatusText}</span>
                        </div>
                        <div class="vm-status-item">
                            <lightning-icon icon-name="utility:battery" size="xx-small"></lightning-icon>
                            <span>{batteryLevel}%</span>
                        </div>
                        <div class="vm-status-item">
                            <lightning-icon icon-name="utility:wifi" size="xx-small"></lightning-icon>
                            <span>{networkStatus}</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Selfie -->
            <div class="vm-section">
                <h3 class="vm-section-title">
                    <lightning-icon icon-name="utility:photo" size="xx-small" class="vm-section-icon"></lightning-icon>
                    Selfie
                </h3>
                <div class="vm-photo-area">
                    <template if:false={startSelfiePreview}>
                        <label class="vm-photo-btn">
                            <lightning-icon icon-name="utility:photo" size="small"></lightning-icon>
                            Capture Selfie
                            <input type="file" accept="image/*" capture="user" class="vm-file-input-hidden" onchange={handleStartSelfieCapture}/>
                        </label>
                    </template>
                    <template if:true={startSelfiePreview}>
                        <div class="vm-photo-preview">
                            <img src={startSelfiePreview} alt="Selfie" class="vm-photo-img"/>
                            <lightning-button-icon icon-name="utility:close" size="small" variant="bare"
                                class="vm-photo-remove" onclick={removeStartSelfie}></lightning-button-icon>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Odometer & Companion -->
            <div class="vm-section">
                <h3 class="vm-section-title">
                    <lightning-icon icon-name="utility:settings" size="xx-small" class="vm-section-icon"></lightning-icon>
                    Additional Details
                </h3>
                <div class="vm-card">
                    <lightning-input type="number" label="Odometer Start (km)" value={odometerStart}
                        onchange={handleOdometerStartChange} class="slds-m-bottom_small"></lightning-input>
                    <div class="slds-m-bottom_small">
                        <lightning-input type="toggle" label="With Companion?" checked={withCompanion}
                            onchange={handleCompanionToggle}></lightning-input>
                    </div>
                    <template if:true={withCompanion}>
                        <div class="vm-companion-search">
                            <lightning-input type="text" label="Search Companion" value={companionSearchTerm}
                                placeholder="Type name..." onchange={handleCompanionSearch}></lightning-input>
                            <template if:true={showCompanionDropdown}>
                                <div class="vm-dropdown">
                                    <template for:each={companionSearchResults} for:item="emp">
                                        <div key={emp.id} class="vm-dropdown-item" data-id={emp.id} onclick={handleCompanionSelect}>
                                            <span class="vm-dropdown-name">{emp.name}</span>
                                            <span class="vm-dropdown-sub">{emp.subtitle}</span>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </div>

            <!-- Start Day Button -->
            <div class="vm-action-center">
                <button class="vm-btn vm-btn-start" disabled={startDayDisabled} onclick={handleStartDay}>
                    <lightning-icon icon-name="utility:play" size="xx-small" variant="inverse"></lightning-icon>
                    Start Day
                </button>
            </div>
        </div>
    </template>

    <!-- ══════════════════════════════════════════════════ -->
    <!-- SCREEN 1B: BEAT SELECTION (after day start)       -->
    <!-- ══════════════════════════════════════════════════ -->
    <template if:true={isBeatSelectScreen}>
        <div class="vm-container">
            <div class="vm-header-bar">
                <div class="vm-header-left">
                    <lightning-icon icon-name="standard:visit" size="small" class="vm-header-icon"></lightning-icon>
                    <span class="vm-header-title">Select Beat</span>
                </div>
                <div class="vm-header-right">
                    <span class="vm-clock">{currentTime}</span>
                </div>
            </div>

            <!-- Day Started Confirmation -->
            <div class="vm-card">
                <div class="vm-daystart-hero">
                    <p class="vm-greeting">Day Started!</p>
                    <p class="vm-date">Now select your beat to begin visits</p>
                </div>
            </div>

            <!-- Today's Assigned Beat(s) -->
            <div class="vm-section">
                <h3 class="vm-section-title">
                    <lightning-icon icon-name="utility:routing_offline" size="xx-small" class="vm-section-icon"></lightning-icon>
                    Today's Assigned Beat
                </h3>
                <template if:true={assignedBeatsWithSelection.length}>
                    <div class="vm-beat-grid">
                        <template for:each={assignedBeatsWithSelection} for:item="beat">
                            <div key={beat.beatId} class={beat.cardClass} data-beat-id={beat.beatId} onclick={handleBeatSelect}>
                                <div class="vm-beat-icon">
                                    <lightning-icon icon-name="standard:location" size="small"></lightning-icon>
                                </div>
                                <div class="vm-beat-info">
                                    <span class="vm-beat-name-text">{beat.beatName}</span>
                                    <span class="vm-beat-code">{beat.beatCode}</span>
                                    <span class="vm-beat-outlets">{beat.outletsLabel}</span>
                                    <span class="vm-beat-jp">{beat.journeyPlanName}</span>
                                </div>
                                <template if:true={beat.isSelected}>
                                    <div class="vm-beat-check">
                                        <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon>
                                    </div>
                                </template>
                                <span class="vm-beat-assigned-tag">Assigned</span>
                            </div>
                        </template>
                    </div>
                </template>
                <template if:false={assignedBeatsWithSelection.length}>
                    <div class="vm-empty">
                        <lightning-icon icon-name="utility:warning" size="small"></lightning-icon>
                        <p>No beats assigned for today.</p>
                    </div>
                </template>
            </div>

            <!-- Other Available Beats -->
            <template if:true={hasOtherBeats}>
                <div class="vm-section">
                    <h3 class="vm-section-title">
                        <lightning-icon icon-name="utility:change_record_type" size="xx-small" class="vm-section-icon"></lightning-icon>
                        Other Available Beats
                    </h3>
                    <div class="vm-beat-grid">
                        <template for:each={otherBeatsWithSelection} for:item="beat">
                            <div key={beat.beatId} class={beat.cardClass} data-beat-id={beat.beatId} onclick={handleBeatSelect}>
                                <div class="vm-beat-icon">
                                    <lightning-icon icon-name="standard:location" size="small"></lightning-icon>
                                </div>
                                <div class="vm-beat-info">
                                    <span class="vm-beat-name-text">{beat.beatName}</span>
                                    <span class="vm-beat-code">{beat.beatCode}</span>
                                    <span class="vm-beat-outlets">{beat.outletsLabel}</span>
                                </div>
                                <template if:true={beat.isSelected}>
                                    <div class="vm-beat-check">
                                        <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Confirm Beat Selection -->
            <div class="vm-action-center">
                <button class="vm-btn vm-btn-start" disabled={selectBeatDisabled} onclick={handleBeatConfirm}>
                    <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon>
                    Confirm Beat
                </button>
            </div>
        </div>

        <!-- Beat Confirm Modal -->
        <template if:true={showBeatConfirmModal}>
            <section class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon icon-name="utility:close" variant="bare-inverse"
                            class="slds-modal__close" onclick={handleBeatConfirmClose}></lightning-button-icon>
                        <h2 class="slds-modal__title">Confirm Beat Selection</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="vm-confirm-content">
                            <lightning-icon icon-name="utility:routing_offline" size="large" class="vm-confirm-icon"></lightning-icon>
                            <p class="vm-confirm-text">You are selecting beat:</p>
                            <p class="vm-confirm-beat-name">{selectedBeatName}</p>
                            <p class="vm-confirm-outlets">{selectedBeatOutletCount} outlets to visit</p>
                            <template if:true={selectedBeatIsAssigned}>
                                <span class="vm-beat-assigned-tag slds-m-top_x-small">Today's Assigned Beat</span>
                            </template>
                            <p class="vm-confirm-note">You can switch to another beat later if needed.</p>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={handleBeatConfirmClose}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleSelectBeatConfirm} disabled={isProcessing}>
                            <template if:true={isProcessing}>Saving...</template>
                            <template if:false={isProcessing}>Confirm Beat</template>
                        </button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </template>

    <!-- ══════════════════════════════════════════════════ -->
    <!-- SCREEN 2: VISIT BOARD                             -->
    <!-- ══════════════════════════════════════════════════ -->
    <template if:true={isVisitBoardScreen}>
        <div class="vm-container">
            <!-- Header with End Day & Switch Beat -->
            <div class="vm-header-bar">
                <div class="vm-header-left">
                    <lightning-icon icon-name="standard:visit" size="small" class="vm-header-icon"></lightning-icon>
                    <span class="vm-header-title">Visit Board</span>
                </div>
                <div class="vm-header-right">
                    <button class="vm-btn-switch" onclick={handleSwitchBeatClick} title="Switch Beat">
                        <lightning-icon icon-name="utility:change_record_type" size="xx-small" variant="inverse"></lightning-icon>
                        Switch Beat
                    </button>
                    <button class="vm-btn-end-sm" onclick={handleEndDayClick}>
                        <lightning-icon icon-name="utility:stop" size="xx-small" variant="inverse"></lightning-icon>
                        End Day
                    </button>
                </div>
            </div>

            <!-- Day Summary Bar -->
            <div class="vm-day-bar">
                <div class="vm-day-bar-top">
                    <div class="vm-day-info">
                        <span class="vm-active-badge"><span class="vm-pulse"></span> Day Active</span>
                        <span class="vm-day-since">Started at {dayStartTimeDisplay}</span>
                    </div>
                    <span class="vm-day-timer">{dayDurationDisplay}</span>
                </div>
                <div class="vm-beat-name">
                    <lightning-icon icon-name="utility:routing_offline" size="xx-small" variant="inverse"></lightning-icon>
                    {currentBeatName}
                </div>
            </div>

            <!-- Stats Grid -->
            <div class="vm-stats-grid">
                <div class="vm-stat">
                    <span class="vm-stat-val vm-stat-blue">{statPlanned}</span>
                    <span class="vm-stat-lbl">Planned</span>
                </div>
                <div class="vm-stat">
                    <span class="vm-stat-val vm-stat-green">{statCompleted}</span>
                    <span class="vm-stat-lbl">Done</span>
                </div>
                <div class="vm-stat">
                    <span class="vm-stat-val vm-stat-orange">{statActive}</span>
                    <span class="vm-stat-lbl">Active</span>
                </div>
                <div class="vm-stat">
                    <span class="vm-stat-val">{statSkipped}</span>
                    <span class="vm-stat-lbl">Skipped</span>
                </div>
                <div class="vm-stat">
                    <span class="vm-stat-val vm-stat-green">{statOrderValue}</span>
                    <span class="vm-stat-lbl">Orders</span>
                </div>
                <div class="vm-stat">
                    <span class="vm-stat-val vm-stat-blue">{statCollection}</span>
                    <span class="vm-stat-lbl">Collection</span>
                </div>
            </div>

            <!-- Board Actions -->
            <div class="vm-board-actions">
                <button class="vm-btn vm-btn-adhoc" onclick={handleAdHocClick}>
                    <lightning-icon icon-name="utility:add" size="xx-small" variant="inverse"></lightning-icon>
                    Ad-Hoc Visit
                </button>
                <button class="vm-btn vm-btn-refresh" onclick={handleBoardRefresh}>
                    <lightning-icon icon-name="utility:refresh" size="xx-small"></lightning-icon>
                </button>
            </div>

            <!-- Tabs -->
            <div class="vm-tabs">
                <button class={plannedTabCls} data-tab="planned" onclick={handleBoardTab}>
                    Planned <span class="vm-tab-badge vm-badge-blue">{statPlanned}</span>
                </button>
                <button class={completedTabCls} data-tab="completed" onclick={handleBoardTab}>
                    Done <span class="vm-tab-badge vm-badge-green">{statCompleted}</span>
                </button>
                <button class={skippedTabCls} data-tab="skipped" onclick={handleBoardTab}>
                    Skipped <span class="vm-tab-badge vm-badge-gray">{statSkipped}</span>
                </button>
            </div>

            <!-- PLANNED TAB — Sequential Visit List -->
            <template if:true={isPlannedTab}>
                <div class="vm-visit-list">
                    <template if:true={plannedVisitsEnriched.length}>
                        <template for:each={plannedVisitsEnriched} for:item="visit">
                            <div key={visit.Id} class={visit.rowClass}>
                                <span class="vm-row-seq">{visit.Visit_Sequence__c}</span>
                                <div class="vm-row-body">
                                    <p class="vm-row-name">{visit.outletName}</p>
                                    <p class="vm-row-addr">{visit.truncatedAddress}</p>
                                </div>
                                <div class="vm-row-btns">
                                    <template if:true={visit.canCheckIn}>
                                        <button class="vm-btn vm-btn-checkin"
                                            data-id={visit.Id}
                                            data-account-id={visit.Account__c}
                                            data-beat-id={visit.Beat__c}
                                            data-jpday-id={visit._journeyPlanDayId}
                                            onclick={handleCheckIn} disabled={isProcessing}>
                                            Check In
                                        </button>
                                    </template>
                                    <button class="vm-btn vm-btn-skip-sm"
                                        data-id={visit.Id}
                                        onclick={handleSkipClick}>
                                        Skip
                                    </button>
                                </div>
                            </div>
                        </template>
                    </template>
                    <template if:false={plannedVisitsEnriched.length}>
                        <div class="vm-empty">
                            <lightning-icon icon-name="utility:check" size="small"></lightning-icon>
                            <p>All visits completed for this beat!</p>
                        </div>
                    </template>
                </div>
            </template>

            <!-- COMPLETED TAB -->
            <template if:true={isCompletedTab}>
                <div class="vm-visit-list">
                    <template if:true={completedVisits.length}>
                        <template for:each={completedVisits} for:item="visit">
                            <div key={visit.Id} class="vm-visit-row vm-row-done vm-row-clickable" data-id={visit.Id} onclick={handleCompletedVisitClick}>
                                <span class="vm-row-seq vm-seq-done">{visit.Visit_Sequence__c}</span>
                                <div class="vm-row-body">
                                    <div class="vm-row-header">
                                        <p class="vm-row-name">{visit.outletName}</p>
                                        <template if:true={visit.Is_Productive__c}>
                                            <span class="vm-badge-prod">Productive</span>
                                        </template>
                                    </div>
                                    <div class="vm-row-meta">
                                        <span>{visit.checkInTimeDisplay} - {visit.checkOutTimeDisplay}</span>
                                        <span>{visit.durationDisplay}</span>
                                        <template if:true={visit.orderValueFormatted}>
                                            <span>{visit.orderValueFormatted}</span>
                                        </template>
                                    </div>
                                </div>
                                <div class="vm-row-chevron">
                                    <lightning-icon icon-name="utility:chevronright" size="xx-small"></lightning-icon>
                                </div>
                            </div>
                        </template>
                    </template>
                    <template if:false={completedVisits.length}>
                        <div class="vm-empty"><p>No completed visits yet.</p></div>
                    </template>
                </div>
            </template>

            <!-- SKIPPED TAB -->
            <template if:true={isSkippedTab}>
                <div class="vm-visit-list">
                    <template if:true={skippedVisits.length}>
                        <template for:each={skippedVisits} for:item="visit">
                            <div key={visit.Id} class="vm-visit-row vm-row-skip">
                                <span class="vm-row-seq vm-seq-skip">{visit.Visit_Sequence__c}</span>
                                <div class="vm-row-body">
                                    <p class="vm-row-name vm-name-strike">{visit.outletName}</p>
                                    <p class="vm-row-addr">{visit.truncatedAddress}</p>
                                </div>
                                <div class="vm-row-btns">
                                    <button class="vm-btn vm-btn-checkin"
                                        data-id={visit.Id}
                                        data-account-id={visit.Account__c}
                                        data-beat-id={visit.Beat__c}
                                        onclick={handleCheckIn} disabled={isProcessing}>
                                        Check In
                                    </button>
                                </div>
                            </div>
                        </template>
                    </template>
                    <template if:false={skippedVisits.length}>
                        <div class="vm-empty"><p>No skipped visits.</p></div>
                    </template>
                </div>
            </template>
        </div>

        <!-- SKIP MODAL -->
        <template if:true={showSkipModal}>
            <section class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon icon-name="utility:close" variant="bare-inverse"
                            class="slds-modal__close" onclick={handleSkipClose}></lightning-button-icon>
                        <h2 class="slds-modal__title">Skip Visit</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-m-bottom_small">Please provide a reason for skipping this visit (mandatory):</p>
                        <lightning-combobox label="Skip Reason" value={skipReason}
                            options={skipReasonOptions} onchange={handleSkipReasonChange}
                            placeholder="Select reason..." required></lightning-combobox>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={handleSkipClose}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleSkipConfirm} disabled={skipDisabled}>Skip Visit</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- SWITCH BEAT MODAL -->
        <template if:true={showSwitchBeatModal}>
            <section class="slds-modal slds-fade-in-open slds-modal_medium">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon icon-name="utility:close" variant="bare-inverse"
                            class="slds-modal__close" onclick={handleSwitchBeatClose}></lightning-button-icon>
                        <h2 class="slds-modal__title">Switch Beat</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-m-bottom_small">Select a beat to switch to:</p>
                        <div class="vm-beat-grid">
                            <template for:each={availableBeatsForSwitch} for:item="beat">
                                <div key={beat.beatId} class={beat.switchCardClass} data-beat-id={beat.beatId} onclick={handleSwitchBeatSelect}>
                                    <div class="vm-beat-icon">
                                        <lightning-icon icon-name="standard:location" size="small"></lightning-icon>
                                    </div>
                                    <div class="vm-beat-info">
                                        <span class="vm-beat-name-text">{beat.beatName}</span>
                                        <span class="vm-beat-outlets">{beat.outletsLabel}</span>
                                    </div>
                                </div>
                            </template>
                        </div>
                        <div class="slds-m-top_medium">
                            <lightning-combobox label="Reason for Switching (Mandatory)" value={switchBeatReason}
                                options={switchBeatReasonOptions} onchange={handleSwitchBeatReasonChange}
                                placeholder="Select reason..." required></lightning-combobox>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={handleSwitchBeatClose}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleSwitchBeatConfirm} disabled={switchBeatDisabled}>Switch Beat</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- AD-HOC MODAL -->
        <template if:true={showAdHocModal}>
            <section class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon icon-name="utility:close" variant="bare-inverse"
                            class="slds-modal__close" onclick={handleAdHocClose}></lightning-button-icon>
                        <h2 class="slds-modal__title">Ad-Hoc Visit</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <p class="slds-m-bottom_small">Search by customer name or customer code:</p>
                        <div class="vm-search-wrapper">
                            <lightning-input label="Search Outlet" value={adHocSearchTerm}
                                placeholder="Customer name or code..." onchange={handleAdHocSearch}></lightning-input>
                            <template if:true={showAdHocDropdown}>
                                <div class="vm-dropdown vm-dropdown-modal">
                                    <template for:each={adHocSearchResults} for:item="outlet">
                                        <div key={outlet.id} class="vm-dropdown-item" data-id={outlet.id} onclick={handleAdHocSelect}>
                                            <span class="vm-dropdown-name">{outlet.name}</span>
                                            <span class="vm-dropdown-sub">{outlet.code} - {outlet.address}</span>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </div>
                        <template if:true={adHocSelectedAccount}>
                            <div class="vm-selected-box slds-m-top_small">
                                <span class="vm-selected-name">{adHocSelectedAccount.name}</span>
                                <span class="vm-selected-sub">{adHocSelectedAccount.code} - {adHocSelectedAccount.address}</span>
                            </div>
                        </template>
                        <div class="slds-m-top_small">
                            <lightning-combobox label="Reason" value={adHocReason}
                                options={adHocReasonOptions} onchange={handleAdHocReasonChange}
                                placeholder="Select reason..."></lightning-combobox>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={handleAdHocClose}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleAdHocConfirm} disabled={adHocSubmitDisabled}>Check In</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>

        <!-- END DAY MODAL -->
        <template if:true={showEndDayModal}>
            <section class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon icon-name="utility:close" variant="bare-inverse"
                            class="slds-modal__close" onclick={handleEndDayClose}></lightning-button-icon>
                        <h2 class="slds-modal__title">End Day</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="vm-checkout-summary slds-m-bottom_medium">
                            <div class="vm-co-stat">
                                <span class="vm-co-stat-val">{statCompleted}</span>
                                <span class="vm-co-stat-lbl">Completed</span>
                            </div>
                            <div class="vm-co-stat">
                                <span class="vm-co-stat-val">{statSkipped}</span>
                                <span class="vm-co-stat-lbl">Skipped</span>
                            </div>
                            <div class="vm-co-stat">
                                <span class="vm-co-stat-val">{statOrderValue}</span>
                                <span class="vm-co-stat-lbl">Orders</span>
                            </div>
                            <div class="vm-co-stat">
                                <span class="vm-co-stat-val">{statCollection}</span>
                                <span class="vm-co-stat-lbl">Collection</span>
                            </div>
                        </div>
                        <lightning-input type="number" label="Odometer End (km)" value={odometerEnd}
                            onchange={handleOdometerEndChange} class="slds-m-bottom_small"></lightning-input>
                        <lightning-textarea label="End Day Remarks" value={endDayRemarks}
                            onchange={handleEndRemarksChange} class="slds-m-bottom_small"></lightning-textarea>
                        <div class="vm-photo-area">
                            <template if:false={endSelfiePreview}>
                                <label class="vm-photo-btn">
                                    <lightning-icon icon-name="utility:photo" size="small"></lightning-icon>
                                    End Day Selfie
                                    <input type="file" accept="image/*" capture="user" class="vm-file-input-hidden" onchange={handleEndSelfieCapture}/>
                                </label>
                            </template>
                            <template if:true={endSelfiePreview}>
                                <div class="vm-photo-preview">
                                    <img src={endSelfiePreview} alt="Selfie" class="vm-photo-img"/>
                                    <lightning-button-icon icon-name="utility:close" size="small" variant="bare"
                                        class="vm-photo-remove" onclick={removeEndSelfie}></lightning-button-icon>
                                </div>
                            </template>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={handleEndDayClose}>Cancel</button>
                        <button class="slds-button slds-button_destructive" onclick={handleEndDayConfirm} disabled={isProcessing}>End Day</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </template>

    <!-- ══════════════════════════════════════════════════ -->
    <!-- SCREEN 3: ACTIVE VISIT                            -->
    <!-- ══════════════════════════════════════════════════ -->
    <template if:true={isVisitActiveScreen}>
        <div class="vm-container">
            <!-- Nav Header with Back Arrow -->
            <div class="vm-header-bar">
                <div class="vm-header-left">
                    <button class="vm-nav-back" onclick={handleBackToBoard} title="Back to Visit Board">
                        <lightning-icon icon-name="utility:chevronleft" size="xx-small" variant="inverse"></lightning-icon>
                    </button>
                    <span class="vm-header-title">Active Visit</span>
                </div>
                <div class="vm-header-right">
                    <button class="vm-btn vm-btn-refresh" onclick={handleRefreshVisitSummary} title="Refresh">
                        <lightning-icon icon-name="utility:refresh" size="xx-small"></lightning-icon>
                    </button>
                </div>
            </div>

            <!-- Visit Header Card -->
            <div class="vm-visit-header">
                <div class="vm-visit-header-top">
                    <div class="vm-visit-outlet-info">
                        <span class="vm-visit-seq-circle">{activeSequence}</span>
                        <div>
                            <p class="vm-visit-outlet-name">{activeOutletName}</p>
                            <div class="vm-visit-badges">
                                <span class="vm-badge-beat">{activeBeatNameDisplay}</span>
                                <template if:true={activeIsAdHoc}>
                                    <span class="vm-badge-adhoc">Ad-Hoc</span>
                                </template>
                                <span class="vm-badge-active-visit">In Progress</span>
                            </div>
                        </div>
                    </div>
                    <div class="vm-visit-timer-box">
                        <span class="vm-visit-timer-label">Duration</span>
                        <span class="vm-visit-timer-value">{visitDurationDisplay}</span>
                    </div>
                </div>

                <!-- KPIs -->
                <div class="vm-visit-kpis">
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{visitCheckInTime}</span>
                        <span class="vm-kpi-lbl">Check In</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{activeOrdersCount}</span>
                        <span class="vm-kpi-lbl">Orders</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{activeOrderValue}</span>
                        <span class="vm-kpi-lbl">Value</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{activeCollectionAmount}</span>
                        <span class="vm-kpi-lbl">Collection</span>
                    </div>
                </div>

                <!-- Checkout Button -->
                <div class="vm-visit-actions-bar">
                    <button class="vm-btn vm-btn-checkout" onclick={handleCheckoutClick}>
                        <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon>
                        Check Out
                    </button>
                </div>
            </div>

            <!-- Visit Detail Tabs -->
            <div class="vm-tabs">
                <button class={activitiesVTabCls} data-tab="activities" onclick={handleActiveVisitTab}>Activities</button>
                <button class={ordersVTabCls} data-tab="orders" onclick={handleActiveVisitTab}>Orders</button>
                <button class={collectionsVTabCls} data-tab="collections" onclick={handleActiveVisitTab}>Collections</button>
                <button class={returnsVTabCls} data-tab="returns" onclick={handleActiveVisitTab}>Returns</button>
                <button class={outletVTabCls} data-tab="outlet" onclick={handleActiveVisitTab}>Outlet</button>
            </div>

            <!-- Activities -->
            <template if:true={isActivitiesVTab}>
                <div class="vm-act-grid">
                    <template for:each={visitActivities} for:item="act">
                        <div key={act.id} class={act.cardClass} data-id={act.id} onclick={handleToggleActivity}>
                            <lightning-icon icon-name={act.icon} size="medium"></lightning-icon>
                            <span class="va-act-name">{act.label}</span>
                            <template if:true={act.completed}>
                                <div class="va-act-check">
                                    <lightning-icon icon-name="utility:check" size="xx-small" variant="inverse"></lightning-icon>
                                </div>
                            </template>
                        </div>
                    </template>
                </div>
            </template>

            <!-- Orders -->
            <template if:true={isOrdersVTab}>
                <div class="vm-tab-content">
                    <template if:true={hasActiveOrders}>
                        <template for:each={activeOrders} for:item="order">
                            <div key={order.Id} class="vm-rec-row">
                                <div class="vm-rec-info">
                                    <span class="vm-rec-name">{order.Name}</span>
                                    <span class="vm-rec-sub">{order.Status__c} - {order.Total_Items__c} items</span>
                                </div>
                                <span class="vm-rec-amt">{order.amountFormatted}</span>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasActiveOrders}>
                        <div class="vm-empty"><p>No orders for this visit.</p></div>
                    </template>
                </div>
            </template>

            <!-- Collections -->
            <template if:true={isCollectionsVTab}>
                <div class="vm-tab-content">
                    <template if:true={hasActiveCollections}>
                        <template for:each={activeCollections} for:item="col">
                            <div key={col.Id} class="vm-rec-row">
                                <div class="vm-rec-info">
                                    <span class="vm-rec-name">{col.Name}</span>
                                    <span class="vm-rec-sub">{col.Payment_Mode__c} - {col.Status__c}</span>
                                </div>
                                <span class="vm-rec-amt">{col.amountFormatted}</span>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasActiveCollections}>
                        <div class="vm-empty"><p>No collections for this visit.</p></div>
                    </template>
                </div>
            </template>

            <!-- Returns -->
            <template if:true={isReturnsVTab}>
                <div class="vm-tab-content">
                    <template if:true={hasActiveReturns}>
                        <template for:each={activeReturns} for:item="ret">
                            <div key={ret.Id} class="vm-rec-row">
                                <div class="vm-rec-info">
                                    <span class="vm-rec-name">{ret.Name}</span>
                                    <span class="vm-rec-sub">{ret.Return_Reason__c} - {ret.Status__c}</span>
                                </div>
                                <span class="vm-rec-amt">{ret.amountFormatted}</span>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasActiveReturns}>
                        <div class="vm-empty"><p>No returns for this visit.</p></div>
                    </template>
                </div>
            </template>

            <!-- Outlet -->
            <template if:true={isOutletVTab}>
                <div class="vm-outlet-summary">
                    <div class="vm-outlet-row">
                        <span class="vm-outlet-lbl">Outlet Type</span>
                        <span class="vm-outlet-val">{outletType}</span>
                    </div>
                    <div class="vm-outlet-row">
                        <span class="vm-outlet-lbl">Channel</span>
                        <span class="vm-outlet-val">{outletChannel}</span>
                    </div>
                    <div class="vm-outlet-row">
                        <span class="vm-outlet-lbl">City</span>
                        <span class="vm-outlet-val">{outletCity}</span>
                    </div>
                    <div class="vm-outlet-row">
                        <span class="vm-outlet-lbl">Last Visit</span>
                        <span class="vm-outlet-val">{outletLastVisit}</span>
                    </div>
                    <div class="vm-outlet-row">
                        <span class="vm-outlet-lbl">Outstanding</span>
                        <span class="vm-outlet-val">{outletOutstanding}</span>
                    </div>
                    <div class="vm-outlet-row">
                        <span class="vm-outlet-lbl">Pending Orders</span>
                        <span class="vm-outlet-val">{outletPendingOrders}</span>
                    </div>
                    <div class="vm-outlet-row">
                        <span class="vm-outlet-lbl">Credit Limit</span>
                        <span class="vm-outlet-val">{outletCreditLimit}</span>
                    </div>
                </div>
            </template>
        </div>

        <!-- CHECKOUT MODAL -->
        <template if:true={showCheckoutModal}>
            <section class="slds-modal slds-fade-in-open slds-modal_medium">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <lightning-button-icon icon-name="utility:close" variant="bare-inverse"
                            class="slds-modal__close" onclick={handleCheckoutClose}></lightning-button-icon>
                        <h2 class="slds-modal__title">Check Out — {activeOutletName}</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <div class="vm-checkout-summary slds-m-bottom_medium">
                            <div class="vm-co-stat">
                                <span class="vm-co-stat-val">{visitDurationDisplay}</span>
                                <span class="vm-co-stat-lbl">Duration</span>
                            </div>
                            <div class="vm-co-stat">
                                <span class="vm-co-stat-val">{activeOrdersCount}</span>
                                <span class="vm-co-stat-lbl">Orders</span>
                            </div>
                            <div class="vm-co-stat">
                                <span class="vm-co-stat-val">{activeOrderValue}</span>
                                <span class="vm-co-stat-lbl">Value</span>
                            </div>
                            <div class="vm-co-stat">
                                <span class="vm-co-stat-val">{activeCollectionAmount}</span>
                                <span class="vm-co-stat-lbl">Collection</span>
                            </div>
                        </div>

                        <!-- Mandatory Checklist -->
                        <div class="vm-checklist">
                            <p class="vm-checklist-title">Visit Checklist</p>
                            <template for:each={checklistItems} for:item="item">
                                <div key={item.id} class="vm-checklist-item vm-yn-item">
                                    <span class="vm-yn-question">{item.label}</span>
                                    <div class="vm-yn-buttons">
                                        <button class={item.yesClass} data-id={item.id} data-answer="yes" onclick={handleChecklistAnswer}>Yes</button>
                                        <button class={item.noClass} data-id={item.id} data-answer="no" onclick={handleChecklistAnswer}>No</button>
                                    </div>
                                </div>
                            </template>
                        </div>

                        <div class="slds-m-top_medium slds-m-bottom_small">
                            <lightning-input type="toggle" label="Productive Visit?" checked={isProductive}
                                onchange={handleProductiveChange}></lightning-input>
                        </div>
                        <template if:false={isProductive}>
                            <lightning-combobox label="Non-Productive Reason" value={nonProductiveReason}
                                options={nonProductiveReasonOptions} onchange={handleNonProductiveReasonChange}
                                placeholder="Select reason..." required></lightning-combobox>
                        </template>
                        <div class="slds-m-top_small">
                            <lightning-textarea label="Visit Notes" value={visitNotes}
                                onchange={handleVisitNotesChange}></lightning-textarea>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <button class="slds-button slds-button_neutral" onclick={handleCheckoutClose}>Cancel</button>
                        <button class="slds-button slds-button_brand" onclick={handleCheckoutConfirm} disabled={checkoutDisabled}>Complete Visit</button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </template>

    <!-- ══════════════════════════════════════════════════ -->
    <!-- SCREEN: COMPLETED VISIT DETAIL                    -->
    <!-- ══════════════════════════════════════════════════ -->
    <template if:true={isVisitDetailScreen}>
        <div class="vm-container">
            <!-- Nav Header with Back Arrow -->
            <div class="vm-header-bar">
                <div class="vm-header-left">
                    <button class="vm-nav-back" onclick={handleBackToBoardFromDetail} title="Back to Visit Board">
                        <lightning-icon icon-name="utility:chevronleft" size="xx-small" variant="inverse"></lightning-icon>
                    </button>
                    <span class="vm-header-title">Visit Details</span>
                </div>
            </div>

            <!-- Visit Header Card -->
            <div class="vm-visit-header">
                <div class="vm-visit-header-top">
                    <div class="vm-visit-outlet-info">
                        <span class="vm-visit-seq-circle">{detailSequence}</span>
                        <div>
                            <p class="vm-visit-outlet-name">{detailOutletName}</p>
                            <div class="vm-visit-badges">
                                <span class="vm-badge-beat">{detailBeatName}</span>
                                <template if:true={detailIsAdHoc}>
                                    <span class="vm-badge-adhoc">Ad-Hoc</span>
                                </template>
                                <template if:true={detailIsProductive}>
                                    <span class="vm-badge-prod">Productive</span>
                                </template>
                                <template if:false={detailIsProductive}>
                                    <span class="vm-badge-nonprod">Non-Productive</span>
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- KPIs -->
                <div class="vm-visit-kpis">
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{detailCheckInTime}</span>
                        <span class="vm-kpi-lbl">Check In</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{detailCheckOutTime}</span>
                        <span class="vm-kpi-lbl">Check Out</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{detailDuration}</span>
                        <span class="vm-kpi-lbl">Duration</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{detailOrdersCount}</span>
                        <span class="vm-kpi-lbl">Orders</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{detailOrderValue}</span>
                        <span class="vm-kpi-lbl">Value</span>
                    </div>
                    <div class="vm-visit-kpi">
                        <span class="vm-kpi-val">{detailCollectionAmount}</span>
                        <span class="vm-kpi-lbl">Collection</span>
                    </div>
                </div>
            </div>

            <!-- Detail Tabs -->
            <div class="vm-tabs">
                <button class={detailOrdersTabCls} data-tab="orders" onclick={handleDetailTab}>
                    Orders
                    <template if:true={hasDetailOrders}>
                        <span class="vm-tab-badge">{detailOrders.length}</span>
                    </template>
                </button>
                <button class={detailCollectionsTabCls} data-tab="collections" onclick={handleDetailTab}>
                    Collections
                    <template if:true={hasDetailCollections}>
                        <span class="vm-tab-badge">{detailCollections.length}</span>
                    </template>
                </button>
                <button class={detailReturnsTabCls} data-tab="returns" onclick={handleDetailTab}>
                    Returns
                    <template if:true={hasDetailReturns}>
                        <span class="vm-tab-badge">{detailReturns.length}</span>
                    </template>
                </button>
            </div>

            <!-- Orders Tab -->
            <template if:true={isDetailOrdersTab}>
                <div class="vm-tab-content">
                    <template if:true={hasDetailOrders}>
                        <template for:each={detailOrders} for:item="order">
                            <div key={order.Id} class="vm-rec-row">
                                <div class="vm-rec-info">
                                    <span class="vm-rec-name">{order.Name}</span>
                                    <span class="vm-rec-sub">{order.Status__c} - {order.Total_Items__c} items</span>
                                </div>
                                <span class="vm-rec-amt">{order.amountFormatted}</span>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasDetailOrders}>
                        <div class="vm-empty"><p>No orders placed during this visit.</p></div>
                    </template>
                </div>
            </template>

            <!-- Collections Tab -->
            <template if:true={isDetailCollectionsTab}>
                <div class="vm-tab-content">
                    <template if:true={hasDetailCollections}>
                        <template for:each={detailCollections} for:item="col">
                            <div key={col.Id} class="vm-rec-row">
                                <div class="vm-rec-info">
                                    <span class="vm-rec-name">{col.Name}</span>
                                    <span class="vm-rec-sub">{col.Payment_Mode__c} - {col.Status__c}</span>
                                </div>
                                <span class="vm-rec-amt">{col.amountFormatted}</span>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasDetailCollections}>
                        <div class="vm-empty"><p>No collections recorded during this visit.</p></div>
                    </template>
                </div>
            </template>

            <!-- Returns Tab -->
            <template if:true={isDetailReturnsTab}>
                <div class="vm-tab-content">
                    <template if:true={hasDetailReturns}>
                        <template for:each={detailReturns} for:item="ret">
                            <div key={ret.Id} class="vm-rec-row">
                                <div class="vm-rec-info">
                                    <span class="vm-rec-name">{ret.Name}</span>
                                    <span class="vm-rec-sub">{ret.Return_Reason__c} - {ret.Status__c}</span>
                                </div>
                                <span class="vm-rec-amt">{ret.amountFormatted}</span>
                            </div>
                        </template>
                    </template>
                    <template if:false={hasDetailReturns}>
                        <div class="vm-empty"><p>No returns recorded during this visit.</p></div>
                    </template>
                </div>
            </template>
        </div>
    </template>

    <!-- Spinner Overlay -->
    <template if:true={isProcessing}>
        <div class="vm-spinner">
            <lightning-spinner alternative-text="Processing" size="medium"></lightning-spinner>
        </div>
    </template>
</template>
