<template>
    <!-- ═══ LOADING SPINNER ═══ -->
    <template lwc:if={isLoading}>
        <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
    </template>

    <template lwc:if={isProcessing}>
        <div class="processing-overlay">
            <lightning-spinner alternative-text="Processing" size="medium"></lightning-spinner>
        </div>
    </template>

    <!-- ═══ DAY NOT STARTED VIEW ═══ -->
    <template lwc:if={isDayNotStarted}>
        <lightning-card title="Visit Execution" icon-name="standard:visit">
            <div class="day-start-container">
                <div class="slds-text-align_center slds-p-vertical_large">
                    <lightning-icon icon-name="utility:clock" size="large" class="slds-m-bottom_medium"></lightning-icon>
                    <h2 class="slds-text-heading_medium slds-m-bottom_small">{todayDateDisplay}</h2>
                    <p class="slds-text-body_regular slds-m-bottom_large">Start your day to begin visit execution.</p>
                    <lightning-button
                        label="Start Day"
                        variant="brand"
                        icon-name="utility:play"
                        onclick={handleStartDay}
                        disabled={isProcessing}
                        class="start-day-btn">
                    </lightning-button>
                </div>
            </div>
        </lightning-card>
    </template>

    <!-- ═══ MAIN VISIT EXECUTION VIEW ═══ -->
    <template lwc:if={isDayStarted}>
        <!-- ── HEADER SECTION ── -->
        <div class="visit-header">
            <div class="header-row">
                <div class="header-left">
                    <h1 class="slds-text-heading_medium">Visit Execution</h1>
                    <p class="header-subtitle">{todayDateDisplay} &bull; Started at {dayStartTimeDisplay}</p>
                </div>
                <div class="header-right">
                    <lightning-button-icon
                        icon-name="utility:refresh"
                        alternative-text="Refresh"
                        onclick={handleRefresh}
                        class="slds-m-right_x-small">
                    </lightning-button-icon>
                    <lightning-button
                        label="End Day"
                        variant="destructive"
                        icon-name="utility:stop"
                        onclick={handleEndDayClick}
                        disabled={hasActiveVisit}
                        class="end-day-btn">
                    </lightning-button>
                </div>
            </div>
        </div>

        <!-- ── BEAT INFO + SWITCH ── -->
        <div class="beat-section">
            <div class="beat-info-row">
                <div class="beat-info">
                    <lightning-icon icon-name="standard:location" size="small" class="slds-m-right_x-small"></lightning-icon>
                    <span class="beat-name">{beatDisplayName}</span>
                    <template lwc:if={isBeatSwitched}>
                        <span class="switched-badge">Switched</span>
                    </template>
                </div>
                <div class="beat-actions">
                    <lightning-button
                        label="Switch Beat"
                        variant="neutral"
                        icon-name="utility:change_record_type"
                        onclick={handleSwitchBeatClick}
                        disabled={hasActiveVisit}
                        class="slds-m-right_x-small">
                    </lightning-button>
                    <template lwc:if={isAdHocEnabled}>
                        <lightning-button
                            label="Ad-Hoc Visit"
                            variant="neutral"
                            icon-name="utility:add"
                            onclick={handleAdHocClick}
                            disabled={hasActiveVisit}>
                        </lightning-button>
                    </template>
                </div>
            </div>
            <template lwc:if={isBeatSwitched}>
                <div class="switch-info">
                    Reason: {beatSwitchReason}
                </div>
            </template>
        </div>

        <!-- ── SUMMARY STATS ── -->
        <div class="summary-section">
            <div class="stats-row">
                <div class="stat-card stat-planned">
                    <div class="stat-value">{totalPlanned}</div>
                    <div class="stat-label">Planned</div>
                </div>
                <div class="stat-card stat-completed">
                    <div class="stat-value">{completedCount}</div>
                    <div class="stat-label">Completed</div>
                </div>
                <div class="stat-card stat-missed">
                    <div class="stat-value">{missedCount}</div>
                    <div class="stat-label">Missed</div>
                </div>
                <div class="stat-card stat-skipped">
                    <div class="stat-value">{skippedCount}</div>
                    <div class="stat-label">Skipped</div>
                </div>
                <div class="stat-card stat-pending">
                    <div class="stat-value">{pendingCount}</div>
                    <div class="stat-label">Pending</div>
                </div>
                <template lwc:if={adHocCount}>
                    <div class="stat-card stat-adhoc">
                        <div class="stat-value">{adHocCount}</div>
                        <div class="stat-label">Ad-Hoc</div>
                    </div>
                </template>
            </div>

            <!-- Progress Bar -->
            <div class="progress-container">
                <div class="progress-labels">
                    <span>Progress</span>
                    <span>{progressPercent}%</span>
                </div>
                <div class="progress-bar-outer">
                    <div class="progress-bar-inner" style={progressBarStyle}></div>
                </div>
            </div>

            <!-- Order / Collection Summary -->
            <div class="money-row">
                <div class="money-item">
                    <lightning-icon icon-name="utility:moneybag" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                    <span class="money-label">Orders:</span>
                    <span class="money-value">{totalOrderValueFormatted}</span>
                </div>
                <div class="money-item">
                    <lightning-icon icon-name="utility:currency" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                    <span class="money-label">Collections:</span>
                    <span class="money-value">{totalCollectionFormatted}</span>
                </div>
            </div>
        </div>

        <!-- ── ACTIVE VISIT TIMER ── -->
        <template lwc:if={hasActiveVisit}>
            <div class="active-visit-banner">
                <lightning-icon icon-name="utility:clock" size="small" class="slds-m-right_x-small pulse-icon"></lightning-icon>
                <span class="active-visit-text">Visit in progress: {activeVisitDurationDisplay}</span>
                <lightning-button
                    label="Check Out"
                    variant="brand"
                    onclick={handleCheckOutClick}
                    class="slds-m-left_small">
                </lightning-button>
            </div>
        </template>

        <!-- ── OUTLET LIST (Sequential) ── -->
        <div class="outlet-list-section">
            <h2 class="section-title">
                <lightning-icon icon-name="standard:outlet" size="small" class="slds-m-right_x-small"></lightning-icon>
                Beat Outlets ({totalPlanned})
                <template lwc:if={isSequenceEnforced}>
                    <span class="sequence-badge">Sequence Enforced</span>
                </template>
            </h2>

            <template for:each={processedOutlets} for:item="outlet">
                <div key={outlet.key}
                     class={outlet.cardClass}
                     data-account-id={outlet.accountId}
                     onclick={handleOutletClick}>


                    <!-- Sequence Number -->
                    <div class="outlet-sequence">
                        <span class={outlet.statusClass}>{outlet.sequenceDisplay}</span>
                    </div>

                    <!-- Outlet Info -->
                    <div class="outlet-info">
                        <div class="outlet-header">
                            <span class="outlet-name">{outlet.accountName}</span>
                            <span class={outlet.statusClass}>{outlet.statusLabel}</span>
                        </div>
                        <div class="outlet-detail">
                            <template lwc:if={outlet.city}>
                                <span class="outlet-city">{outlet.city}</span>
                            </template>
                            <template lwc:if={outlet.accountType}>
                                <span class="outlet-type">{outlet.accountType}</span>
                            </template>
                        </div>

                        <!-- Visit details for handled outlets -->
                        <template lwc:if={outlet.isHandled}>
                            <div class="outlet-visit-details">
                                <template lwc:if={outlet.isCompleted}>
                                    <span class="detail-item">{outlet.checkInTimeDisplay} - {outlet.checkOutTimeDisplay}</span>
                                    <span class="detail-item">{outlet.durationDisplay}</span>
                                    <template lwc:if={outlet.orderValueDisplay}>
                                        <span class="detail-item order-value">{outlet.orderValueDisplay}</span>
                                    </template>
                                </template>
                                <template lwc:if={outlet.isMissed}>
                                    <span class="detail-item missed-reason">Reason: {outlet.missedReason}</span>
                                    <template lwc:if={outlet.rescheduleDateDisplay}>
                                        <span class="detail-item reschedule-date">Rescheduled: {outlet.rescheduleDateDisplay}</span>
                                    </template>
                                </template>
                            </div>
                        </template>

                        <!-- Checked-in details -->
                        <template lwc:if={outlet.isCheckedIn}>
                            <div class="outlet-visit-details">
                                <span class="detail-item active-badge">In Visit: {outlet.checkInTimeDisplay}</span>
                            </div>
                        </template>
                    </div>

                    <!-- Actions -->
                    <div class="outlet-actions">
                        <template lwc:if={outlet.canCheckIn}>
                            <lightning-button
                                label="Check In"
                                variant="brand"
                                data-account-id={outlet.accountId}
                                data-beat-id={outlet.beatId}
                                onclick={handleCheckIn}
                                class="action-btn">
                            </lightning-button>
                        </template>
                        <template lwc:if={outlet.canCheckOut}>
                            <lightning-button
                                label="Check Out"
                                variant="success"
                                data-visit-id={outlet.visitId}
                                onclick={handleCheckOutClick}
                                class="action-btn">
                            </lightning-button>
                        </template>
                        <template lwc:if={outlet.canMarkMissed}>
                            <lightning-button-icon
                                icon-name="utility:ban"
                                alternative-text="Mark Missed"
                                variant="border-filled"
                                data-account-id={outlet.accountId}
                                onclick={handleMissedClick}
                                tooltip="Mark as Missed"
                                class="action-icon">
                            </lightning-button-icon>
                        </template>
                        <template lwc:if={outlet.canSkip}>
                            <lightning-button-icon
                                icon-name="utility:forward"
                                alternative-text="Skip"
                                variant="border-filled"
                                data-account-id={outlet.accountId}
                                onclick={handleSkipClick}
                                tooltip="Skip Visit"
                                class="action-icon">
                            </lightning-button-icon>
                        </template>
                        <template lwc:if={outlet.canReschedule}>
                            <lightning-button
                                label="Reschedule"
                                variant="neutral"
                                data-visit-id={outlet.visitId}
                                onclick={handleRescheduleClick}
                                class="action-btn-sm">
                            </lightning-button>
                        </template>
                    </div>
                </div>
            </template>

            <!-- Empty state -->
            <template lwc:if={noOutlets}>
                <div class="empty-state">
                    <lightning-icon icon-name="utility:info" size="large"></lightning-icon>
                    <p>No outlets found for this beat. Switch to a different beat or create an ad-hoc visit.</p>
                </div>
            </template>
        </div>
    </template>

    <!-- ═══════════════════════════════════════════════════════════ -->
    <!--  MODALS                                                     -->
    <!-- ═══════════════════════════════════════════════════════════ -->

    <!-- ── BEAT SWITCH MODAL ── -->
    <template lwc:if={showBeatSwitchModal}>
        <section class="slds-modal slds-fade-in-open" role="dialog">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close" variant="bare-inverse"
                        class="slds-modal__close" onclick={closeBeatSwitchModal}>
                    </lightning-button-icon>
                    <h2 class="slds-modal__title">Switch Beat</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-combobox
                        label="Select New Beat"
                        placeholder="Choose a beat..."
                        options={beatSwitchOptions}
                        value={selectedSwitchBeatId}
                        onchange={handleSwitchBeatChange}
                        required>
                    </lightning-combobox>
                    <lightning-combobox
                        label="Reason for Switching"
                        placeholder="Select reason..."
                        options={switchReasonOptions}
                        value={selectedSwitchReason}
                        onchange={handleSwitchReasonChange}
                        required
                        class="slds-m-top_small">
                    </lightning-combobox>
                    <lightning-textarea
                        label="Additional Notes"
                        value={switchNotes}
                        onchange={handleSwitchNotesChange}
                        max-length="500"
                        class="slds-m-top_small">
                    </lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeBeatSwitchModal}></lightning-button>
                    <lightning-button
                        label="Switch Beat"
                        variant="brand"
                        onclick={handleSwitchBeatConfirm}
                        disabled={isSwitchDisabled}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- ── MISSED VISIT MODAL ── -->
    <template lwc:if={showMissedModal}>
        <section class="slds-modal slds-fade-in-open" role="dialog">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close" variant="bare-inverse"
                        class="slds-modal__close" onclick={closeMissedModal}>
                    </lightning-button-icon>
                    <h2 class="slds-modal__title">Mark Visit as Missed</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template lwc:if={missedOutlet}>
                        <div class="modal-outlet-info slds-m-bottom_small">
                            <strong>{missedOutlet.accountName}</strong>
                            <template lwc:if={missedOutlet.city}>
                                <span> - {missedOutlet.city}</span>
                            </template>
                        </div>
                    </template>
                    <lightning-combobox
                        label="Reason for Missing"
                        placeholder="Select reason..."
                        options={missedReasonOptions}
                        value={selectedMissedReason}
                        onchange={handleMissedReasonChange}
                        required>
                    </lightning-combobox>
                    <lightning-textarea
                        label="Notes"
                        value={missedNotes}
                        onchange={handleMissedNotesChange}
                        max-length="1000"
                        class="slds-m-top_small">
                    </lightning-textarea>
                    <lightning-input
                        type="date"
                        label="Reschedule To (Optional)"
                        value={rescheduleDate}
                        onchange={handleRescheduleDateChange}
                        class="slds-m-top_small">
                    </lightning-input>
                    <p class="slds-text-color_weak slds-text-body_small slds-m-top_xx-small">
                        Optionally reschedule this visit to a future date.
                    </p>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeMissedModal}></lightning-button>
                    <lightning-button
                        label="Mark as Missed"
                        variant="destructive"
                        onclick={handleMissedConfirm}
                        disabled={isMissedDisabled}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- ── RESCHEDULE MODAL ── -->
    <template lwc:if={showRescheduleModal}>
        <section class="slds-modal slds-fade-in-open" role="dialog">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close" variant="bare-inverse"
                        class="slds-modal__close" onclick={closeRescheduleModal}>
                    </lightning-button-icon>
                    <h2 class="slds-modal__title">Reschedule Visit</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-input
                        type="date"
                        label="Reschedule Date"
                        value={newRescheduleDate}
                        onchange={handleNewRescheduleDateChange}
                        required>
                    </lightning-input>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeRescheduleModal}></lightning-button>
                    <lightning-button
                        label="Reschedule"
                        variant="brand"
                        onclick={handleRescheduleConfirm}
                        disabled={isRescheduleDisabled}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- ── SKIP MODAL ── -->
    <template lwc:if={showSkipModal}>
        <section class="slds-modal slds-fade-in-open" role="dialog">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close" variant="bare-inverse"
                        class="slds-modal__close" onclick={closeSkipModal}>
                    </lightning-button-icon>
                    <h2 class="slds-modal__title">Skip Visit</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <template lwc:if={skipOutlet}>
                        <div class="modal-outlet-info slds-m-bottom_small">
                            <strong>{skipOutlet.accountName}</strong>
                        </div>
                    </template>
                    <lightning-combobox
                        label="Reason for Skipping"
                        placeholder="Select reason..."
                        options={skipReasonOptions}
                        value={selectedSkipReason}
                        onchange={handleSkipReasonChange}
                        required>
                    </lightning-combobox>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeSkipModal}></lightning-button>
                    <lightning-button
                        label="Skip Visit"
                        variant="destructive"
                        onclick={handleSkipConfirm}
                        disabled={isSkipDisabled}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- ── AD-HOC VISIT MODAL ── -->
    <template lwc:if={showAdHocModal}>
        <section class="slds-modal slds-fade-in-open" role="dialog">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close" variant="bare-inverse"
                        class="slds-modal__close" onclick={closeAdHocModal}>
                    </lightning-button-icon>
                    <h2 class="slds-modal__title">Create Ad-Hoc Visit</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="search-container">
                        <lightning-input
                            label="Search Outlet"
                            placeholder="Type outlet name..."
                            value={adHocSearchTerm}
                            onchange={handleAdHocSearch}>
                        </lightning-input>
                        <template lwc:if={showAdHocDropdown}>
                            <div class="search-dropdown">
                                <template for:each={adHocSearchResults} for:item="result">
                                    <div key={result.id}
                                         class="search-result-item"
                                         data-id={result.id}
                                         onclick={handleAdHocOutletSelect}>
                                        <span class="result-name">{result.name}</span>
                                        <span class="result-address">{result.address}</span>
                                    </div>
                                </template>
                            </div>
                        </template>
                    </div>

                    <template lwc:if={adHocSelectedAccount}>
                        <div class="selected-outlet slds-m-top_small">
                            <lightning-icon icon-name="utility:check" size="x-small" class="slds-m-right_xx-small"></lightning-icon>
                            <strong>{adHocSelectedAccount.name}</strong> - {adHocSelectedAccount.address}
                        </div>
                    </template>

                    <lightning-combobox
                        label="Reason"
                        placeholder="Select reason..."
                        options={adHocReasonOptions}
                        value={adHocReason}
                        onchange={handleAdHocReasonChange}
                        class="slds-m-top_small">
                    </lightning-combobox>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeAdHocModal}></lightning-button>
                    <lightning-button
                        label="Create Visit"
                        variant="brand"
                        onclick={handleAdHocConfirm}
                        disabled={isAdHocSubmitDisabled}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- ── CHECK-OUT MODAL ── -->
    <template lwc:if={showCheckOutModal}>
        <section class="slds-modal slds-fade-in-open" role="dialog">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close" variant="bare-inverse"
                        class="slds-modal__close" onclick={closeCheckOutModal}>
                    </lightning-button-icon>
                    <h2 class="slds-modal__title">Check Out</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="slds-m-bottom_small">
                        <lightning-input
                            type="toggle"
                            label="Productive Visit"
                            checked={isCheckOutProductive}
                            onchange={handleProductiveToggle}
                            message-toggle-active="Productive"
                            message-toggle-inactive="Non-Productive">
                        </lightning-input>
                    </div>
                    <template lwc:if={showNonProductiveField}>
                        <lightning-combobox
                            label="Non-Productive Reason"
                            placeholder="Select reason..."
                            options={nonProductiveReasonOptions}
                            value={nonProductiveReason}
                            onchange={handleNonProductiveReasonChange}
                            required
                            class="slds-m-bottom_small">
                        </lightning-combobox>
                    </template>
                    <lightning-textarea
                        label="Visit Notes"
                        value={checkOutNotes}
                        onchange={handleCheckOutNotesChange}
                        max-length="1000">
                    </lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeCheckOutModal}></lightning-button>
                    <lightning-button
                        label="Check Out"
                        variant="brand"
                        onclick={handleCheckOutConfirm}
                        disabled={isCheckOutDisabled}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!-- ── END DAY MODAL ── -->
    <template lwc:if={showEndDayModal}>
        <section class="slds-modal slds-fade-in-open" role="dialog">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close" variant="bare-inverse"
                        class="slds-modal__close" onclick={closeEndDayModal}>
                    </lightning-button-icon>
                    <h2 class="slds-modal__title">End Day</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <div class="end-day-summary slds-m-bottom_medium">
                        <h3 class="slds-text-heading_small slds-m-bottom_small">Day Summary</h3>
                        <div class="summary-grid">
                            <div class="summary-item">
                                <span class="summary-label">Completed</span>
                                <span class="summary-value">{completedCount}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Missed</span>
                                <span class="summary-value">{missedCount}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Skipped</span>
                                <span class="summary-value">{skippedCount}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Orders</span>
                                <span class="summary-value">{totalOrderValueFormatted}</span>
                            </div>
                            <div class="summary-item">
                                <span class="summary-label">Collections</span>
                                <span class="summary-value">{totalCollectionFormatted}</span>
                            </div>
                        </div>
                    </div>

                    <template lwc:if={pendingCount}>
                        <div class="slds-notify slds-notify_alert slds-theme_warning slds-m-bottom_small" role="alert">
                            <p>You have {pendingCount} pending visit(s). They will remain as planned.</p>
                        </div>
                    </template>

                    <lightning-textarea
                        label="End of Day Remarks"
                        value={endDayRemarks}
                        onchange={handleEndRemarksChange}
                        max-length="500">
                    </lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeEndDayModal}></lightning-button>
                    <lightning-button
                        label="End Day"
                        variant="destructive"
                        onclick={handleEndDay}
                        disabled={isProcessing}
                        class="slds-m-left_x-small">
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
